services:
  - type: web
    name: costallocator-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://costallocator-pro.vercel.app","http://localhost:3000"]'
      - key: DEBUG
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
