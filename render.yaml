services:
  - type: web
    name: costallocator-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic stamp head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: "postgresql://neondb_owner:npg_ym6MlecX0fut@ep-purple-recipe-az37wddy.c-3.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://costallocator-pro.vercel.app","http://localhost:3000"]'
      - key: DEBUG
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
